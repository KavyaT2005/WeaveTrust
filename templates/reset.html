<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>
body{font-family:Arial;background:#f4f6f9}

.box{
width:350px;
margin:120px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 16px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#3b73d1;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="box">
<h3>Reset Password</h3>

<form method="post">

<input name="password" type="password" placeholder="New Password" required>

<button>Update Password</button>

</form>

</div>

</body>
</html>
